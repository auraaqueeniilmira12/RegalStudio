<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pesanan - Admin RegalStudio</title>
    <link rel="stylesheet" href="../client/css/style.css">
    <link rel="stylesheet" href="../client/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-container { display: flex; min-height: 100vh; padding-top: 80px; }
        .sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border-color); padding: 2rem 1.5rem; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--radius-md); color: var(--text-primary); text-decoration: none; transition: all 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: var(--primary); color: white; }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; }
        .page-title { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-btn { padding: 0.5rem 1.5rem; background: var(--bg-light); border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active { background: var(--primary); color: white; }
        .orders-table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        .orders-table th, .orders-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; }
        .status-pending { background: #F59E0B; color: white; }
        .status-paid { background: #3B82F6; color: white; }
        .status-process { background: #8B5CF6; color: white; }
        .status-done { background: #10B981; color: white; }
        .status-cancelled { background: #EF4444; color: white; }
        .btn-action { padding: 0.25rem 0.5rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.7rem; margin: 0.1rem; border: none; }
        .btn-delete { background: #EF4444; color: white; }
        .btn-view { background: #0EA5E9; color: white; }
        .btn-upload { background: #10B981; color: white; }
        .btn-verify { background: #F59E0B; color: white; }
        .btn-preview { background: #8B5CF6; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); border-radius: var(--radius-xl); padding: 2rem; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .order-detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--bg-light); }
        .result-link { display: inline-block; padding: 0.25rem 0.5rem; background: #10B98120; color: #10B981; border-radius: var(--radius-sm); text-decoration: none; font-size: 0.75rem; }
        .result-link:hover { background: #10B981; color: white; }
        input, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-white); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 0.25rem; }
        .empty-state { text-align: center; padding: 3rem; }
        .proof-image { max-width: 100%; border-radius: 8px; margin-top: 1rem; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); }
        .btn-block { width: 100%; margin-top: 1rem; }
        .note { font-size: 0.8rem; color: var(--gray); margin-top: 0.5rem; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } .sidebar { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo"><h2>RegalStudio</h2></div>
            <ul class="nav-menu">
                <li><a href="../client/index.html">Beranda</a></li>
                <li><a href="../client/services.html">Layanan</a></li>
                <li><a href="../client/portfolio.html">Portofolio</a></li>
                <li><a href="../client/ebook.html">E-book</a></li>
                <li><a href="../client/contact.html">Kontak</a></li>
            </ul>
            <div class="nav-actions">
                <a href="#" id="logoutAdminBtn" class="btn-primary" style="padding:0.5rem 1rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-logo">Admin Panel</div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> Kelola Pesanan</a></li>
                <li><a href="services.html"><i class="fas fa-cog"></i> Kelola Layanan</a></li>
                <li><a href="manage-admins.html"><i class="fas fa-users-cog"></i> Kelola Admin</a></li>
                <li><a href="profile.html"><i class="fas fa-user-circle"></i> Profil Admin</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-title">
                <h1><i class="fas fa-shopping-bag"></i> Kelola Pesanan</h1>
                <button class="btn-primary" onclick="exportOrders()" style="padding:0.5rem 1rem;"><i class="fas fa-download"></i> Export Data</button>
            </div>

            <div class="filter-tabs">
                <button class="filter-btn active" data-status="all">Semua</button>
                <button class="filter-btn" data-status="pending">Menunggu Bayar</button>
                <button class="filter-btn" data-status="paid">Verifikasi</button>
                <button class="filter-btn" data-status="process">Diproses</button>
                <button class="filter-btn" data-status="done">Selesai</button>
                <button class="filter-btn" data-status="cancelled">Dibatalkan</button>
            </div>

            <div id="ordersList"></div>
        </main>
    </div>

    <!-- Modal Detail Pesanan -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-receipt"></i> Detail Pesanan</h3>
                <button class="modal-close" onclick="closeDetailModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailModalBody"></div>
        </div>
    </div>

    <!-- Modal Lihat Bukti Pembayaran -->
    <div id="proofModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-image"></i> Bukti Pembayaran</h3>
                <button class="modal-close" onclick="closeProofModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="proofModalBody" style="text-align: center;"></div>
        </div>
    </div>

    <!-- Modal Verifikasi Pembayaran -->
    <div id="verifyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-double"></i> Verifikasi Pembayaran</h3>
                <button class="modal-close" onclick="closeVerifyModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="verifyModalBody"></div>
        </div>
    </div>

    <!-- Modal Upload Hasil -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-upload"></i> Upload Hasil Pekerjaan</h3>
                <button class="modal-close" onclick="closeUploadModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="uploadModalBody"></div>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('regalstudio_session') || sessionStorage.getItem('regalstudio_session') || 'null');
        if (!session || session.role !== 'admin') window.location.href = '../client/login.html';

        let currentOrderId = null;

        function formatPrice(price) { return 'Rp ' + price.toLocaleString('id-ID'); }

        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="status-badge status-pending"><i class="fas fa-clock"></i> Menunggu Bayar</span>',
                'paid': '<span class="status-badge status-paid"><i class="fas fa-check-circle"></i> Verifikasi</span>',
                'process': '<span class="status-badge status-process"><i class="fas fa-spinner"></i> Diproses</span>',
                'done': '<span class="status-badge status-done"><i class="fas fa-trophy"></i> Selesai</span>',
                'cancelled': '<span class="status-badge status-cancelled"><i class="fas fa-times"></i> Dibatalkan</span>'
            };
            return badges[status] || badges['pending'];
        }

        function getStatusText(status) {
            const texts = { 'pending': 'Menunggu Pembayaran', 'paid': 'Menunggu Verifikasi', 'process': 'Sedang Diproses', 'done': 'Selesai', 'cancelled': 'Dibatalkan' };
            return texts[status] || status;
        }

        function renderOrders(status = 'all') {
            let orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            if (status !== 'all') orders = orders.filter(o => o.status === status);
            orders.sort((a, b) => new Date(b.date) - new Date(a.date));

            const container = document.getElementById('ordersList');
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 3rem; color: var(--gray);"></i><p>Tidak ada pesanan</p></div>';
                return;
            }

            let html = `<table class="orders-table"><thead><tr><th>No. Order</th><th>Customer</th><th>WhatsApp</th><th>Total</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead><tbody>`;
            orders.forEach(order => {
                html += `<tr>
                    <td>#REG-${order.id}${order.result_file ? '<br><span style="font-size:0.65rem; color:#10B981;"><i class="fas fa-download"></i> Hasil ada</span>' : ''}${order.status === 'process' ? '<br><span style="font-size:0.65rem; color:#8B5CF6;"><i class="fas fa-spinner"></i> Sedang dikerjakan</span>' : ''}${order.status === 'done' ? '<br><span style="font-size:0.65rem; color:#10B981;"><i class="fas fa-check-circle"></i> Selesai</span>' : ''}</td>
                    <td>${escapeHtml(order.customerName)}${order.paymentProof ? '<br><span style="font-size:0.65rem; color:#10B981;"><i class="fas fa-check-circle"></i> Ada Bukti</span>' : ''}</td>
                    <td>${escapeHtml(order.customerPhone)}${order.status === 'paid' ? '<br><span style="font-size:0.65rem; color:#F59E0B;"><i class="fas fa-clock"></i> Perlu Verifikasi</span>' : ''}${order.status === 'process' ? '<br><span style="font-size:0.65rem; color:#8B5CF6;"><i class="fas fa-cogs"></i> Diproses</span>' : ''}${order.status === 'done' ? '<br><span style="font-size:0.65rem; color:#10B981;"><i class="fas fa-trophy"></i> Selesai</span>' : ''}</td>
                    <td>${formatPrice(order.totalPrice || 0)}${order.result_file ? '<br><span style="font-size:0.65rem;"><a href="'+order.result_file+'" target="_blank" style="color:#10B981;">Lihat Hasil</a></span>' : ''}</td>
                    <td>${getStatusBadge(order.status)}${order.result_file ? '<br><span style="font-size:0.65rem; color:#10B981;"><i class="fas fa-check-circle"></i> Selesai</span>' : ''}${order.status === 'process' ? '<br><span style="font-size:0.65rem; color:#8B5CF6;"><i class="fas fa-hourglass-half"></i> Proses</span>' : ''}</td>
                    <td>${new Date(order.date).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewOrderDetail(${order.id})"><i class="fas fa-eye"></i> Detail</button>
                        ${order.paymentProof ? `<button class="btn-action btn-preview" onclick="viewPaymentProof(${order.id})"><i class="fas fa-image"></i> Bukti</button>` : ''}
                        ${order.status === 'paid' ? `<button class="btn-action btn-verify" onclick="openVerifyModal(${order.id})"><i class="fas fa-check-double"></i> Verifikasi</button>` : ''}
                        <button class="btn-action btn-upload" onclick="openUploadModal(${order.id})"><i class="fas fa-cloud-upload-alt"></i> Upload Hasil</button>
                        <button class="btn-action btn-delete" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function viewOrderDetail(orderId) {
            const orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            let itemsHtml = '';
            if (order.items && order.items.length > 0) {
                itemsHtml = order.items.map(item => `<div class="order-detail-row"><span>${escapeHtml(item.name)} ${item.quantity > 1 ? `<i class="fas fa-times"></i>${item.quantity}` : ''}</span><span>${formatPrice(item.price * (item.quantity || 1))}</span></div>`).join('');
            } else if (order.serviceName) {
                itemsHtml = `<div class="order-detail-row"><span>${escapeHtml(order.serviceName)}</span><span>${formatPrice(order.totalPrice || 0)}</span></div>`;
            }

            let resultHtml = order.result_file ? `<div class="order-detail-row"><strong>Hasil Pekerjaan</strong><span><a href="${order.result_file}" target="_blank" class="result-link"><i class="fas fa-external-link-alt"></i> Lihat Hasil</a></span></div>` : '';

            document.getElementById('detailModalBody').innerHTML = `
                <div class="order-detail-row"><strong>Nomor Order</strong><span>#REG-${order.id}</span></div>
                ${itemsHtml}
                <div class="order-detail-row"><strong>Nama Customer</strong><span>${escapeHtml(order.customerName)}</span></div>
                <div class="order-detail-row"><strong>Email</strong><span>${escapeHtml(order.customerEmail)}</span></div>
                <div class="order-detail-row"><strong>WhatsApp</strong><span>${escapeHtml(order.customerPhone)}</span></div>
                <div class="order-detail-row"><strong>Total Harga</strong><span style="color:var(--primary);font-weight:700;">${formatPrice(order.totalPrice || 0)}</span></div>
                <div class="order-detail-row"><strong>Metode Pembayaran</strong><span>${order.paymentMethod || '-'}</span></div>
                <div class="order-detail-row"><strong>Status</strong><span>${getStatusText(order.status)}</span></div>
                <div class="order-detail-row"><strong>Tanggal Order</strong><span>${new Date(order.date).toLocaleString('id-ID')}</span></div>
                ${resultHtml}
                ${order.notes ? `<div class="order-detail-row"><strong>Catatan</strong><span>${escapeHtml(order.notes)}</span></div>` : ''}
            `;
            document.getElementById('detailModal').classList.add('show');
        }

        function viewPaymentProof(orderId) {
            const orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (order && order.paymentProof) {
                let proofHtml = '';
                if (order.paymentProof.startsWith('data:image')) {
                    proofHtml = `<img src="${order.paymentProof}" alt="Bukti Pembayaran" class="proof-image" style="max-width:100%; border-radius:8px;">`;
                } else if (order.paymentProof.match(/\.(jpg|jpeg|png|gif|webp)$/i) || order.paymentProof.startsWith('http')) {
                    proofHtml = `<img src="${order.paymentProof}" alt="Bukti Pembayaran" class="proof-image" style="max-width:100%; border-radius:8px;" onerror="this.onerror=null; this.parentElement.innerHTML='<p class="note"><i class="fas fa-exclamation-triangle"></i> Gambar tidak dapat dimuat.</p>'">`;
                } else {
                    proofHtml = `<p class="note"><i class="fas fa-file"></i> File: ${order.paymentProof}</p>`;
                }
                
                document.getElementById('proofModalBody').innerHTML = `
                    <p><strong>Order #REG-${order.id}</strong></p>
                    <p><strong>Nama:</strong> ${escapeHtml(order.customerName)}</p>
                    <p><strong>Total:</strong> ${formatPrice(order.totalPrice)}</p>
                    ${proofHtml}
                    <p class="note" style="margin-top: 1rem;"><i class="fas fa-info-circle"></i> Pastikan nominal dan data sudah sesuai sebelum memverifikasi.</p>
                `;
                document.getElementById('proofModal').classList.add('show');
            } else {
                alert('Tidak ada bukti pembayaran.');
            }
        }

        function openVerifyModal(orderId) {
            currentOrderId = orderId;
            const orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            
            document.getElementById('verifyModalBody').innerHTML = `
                <div class="order-detail-row" style="margin-bottom: 1rem;"><strong>Order #REG-${orderId}</strong><span>${order?.customerName}</span></div>
                <div class="order-detail-row"><strong>Total Pembayaran</strong><span>${formatPrice(order?.totalPrice)}</span></div>
                <div class="order-detail-row"><strong>Status Saat Ini</strong><span>${getStatusText(order?.status)}</span></div>
                <p style="margin: 1rem 0;">Apakah bukti pembayaran sudah sesuai dan valid?</p>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-primary" onclick="verifyPayment(true)" style="flex:1;"><i class="fas fa-check"></i> Ya, Verifikasi</button>
                    <button class="btn-secondary" onclick="closeVerifyModal()" style="flex:1;"><i class="fas fa-times"></i> Batal</button>
                </div>
                <p class="note" style="margin-top: 1rem;"><i class="fas fa-info-circle"></i> Setelah diverifikasi, status akan berubah menjadi <strong>Diproses</strong>.</p>
            `;
            document.getElementById('verifyModal').classList.add('show');
        }

        function verifyPayment(approved) {
            if (approved) {
                let orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
                orders = orders.map(o => o.id === currentOrderId ? { ...o, status: 'process' } : o);
                localStorage.setItem('regalstudio_orders', JSON.stringify(orders));
                closeVerifyModal();
                renderOrders(document.querySelector('.filter-btn.active').dataset.status);
                alert('✅ Pembayaran diverifikasi! Pesanan sekarang masuk tahap "Diproses".');
            } else {
                closeVerifyModal();
            }
        }

        function openUploadModal(orderId) {
            currentOrderId = orderId;
            const orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            
            let currentStatus = order?.status || 'unknown';
            let statusNote = '';
            if (currentStatus !== 'process') {
                statusNote = '<p class="note" style="color: #F59E0B;"><i class="fas fa-exclamation-triangle"></i> Status pesanan saat ini: ' + getStatusText(currentStatus) + '. Sebaiknya ubah status ke "Diproses" terlebih dahulu jika pekerjaan sedang dikerjakan.</p>';
            }
            
            document.getElementById('uploadModalBody').innerHTML = `
                <div class="order-detail-row" style="margin-bottom: 1rem;">
                    <strong>Order #REG-${orderId}</strong>
                    <span>${order?.customerName}</span>
                </div>
                <div class="order-detail-row" style="margin-bottom: 1rem;">
                    <strong>Status Saat Ini</strong>
                    <span style="background:${order?.status === 'process' ? '#8B5CF6' : '#F59E0B'}; color:white; padding:0.2rem 0.5rem; border-radius:50px; font-size:0.7rem;">${getStatusText(currentStatus)}</span>
                </div>
                ${statusNote}
                <div class="form-group">
                    <label><i class="fas fa-link"></i> Link Hasil Pekerjaan (Google Drive, dll)</label>
                    <input type="url" id="resultLink" placeholder="https://drive.google.com/..." value="${order?.result_file || ''}">
                    <small>Masukkan link yang bisa diakses customer</small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-file-alt"></i> Atau Upload File</label>
                    <input type="file" id="resultFile" accept=".pdf,.zip,.jpg,.png,.mp4,.docx,.html,.txt">
                    <small>File akan diubah ke base64 (max 2MB)</small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Update Status Setelah Upload</label>
                    <select id="newStatusAfterUpload" class="status-select">
                        <option value="process" ${order?.status === 'process' ? 'selected' : ''}>Tetap Diproses</option>
                        <option value="done" ${order?.status === 'done' ? 'selected' : ''}>Selesai (Customer bisa lihat hasil)</option>
                    </select>
                    <small>Pilih "Selesai" jika pekerjaan sudah selesai dan hasil sudah diupload.</small>
                </div>
                <button class="btn-primary btn-block" onclick="saveResultWithStatus()">Simpan Hasil</button>
            `;
            document.getElementById('uploadModal').classList.add('show');
        }

        function saveResultWithStatus() {
            const linkInput = document.getElementById('resultLink');
            const fileInput = document.getElementById('resultFile');
            const newStatus = document.getElementById('newStatusAfterUpload')?.value || 'process';
            
            if (linkInput.value.trim()) {
                saveResultToOrder(linkInput.value.trim(), newStatus);
            } else if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    alert('Ukuran file maksimal 2MB!');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) { 
                    saveResultToOrder(e.target.result, newStatus); 
                };
                reader.readAsDataURL(file);
            } else {
                alert('Harap isi link atau upload file!');
            }
        }

        function saveResultToOrder(resultData, newStatus) {
            let orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            orders = orders.map(o => o.id === currentOrderId ? { ...o, result_file: resultData, status: newStatus } : o);
            localStorage.setItem('regalstudio_orders', JSON.stringify(orders));
            closeUploadModal();
            renderOrders(document.querySelector('.filter-btn.active').dataset.status);
            if (newStatus === 'done') {
                alert('Hasil pekerjaan berhasil diupload! Status pesanan diubah menjadi "Selesai". Customer sekarang bisa melihat hasilnya.');
            } else {
                alert('Hasil pekerjaan berhasil diupload! Status pesanan tetap "Diproses".');
            }
        }

        function deleteOrder(id) {
            if (confirm('Yakin ingin menghapus pesanan ini? Tindakan ini tidak dapat dibatalkan.')) {
                let orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('regalstudio_orders', JSON.stringify(orders));
                renderOrders(document.querySelector('.filter-btn.active').dataset.status);
                alert('Pesanan berhasil dihapus!');
            }
        }

        function exportOrders() {
            const orders = JSON.parse(localStorage.getItem('regalstudio_orders') || '[]');
            const data = orders.map(o => ({ 'Nomor Order': `REG-${o.id}`, 'Nama Customer': o.customerName, 'Email': o.customerEmail, 'WhatsApp': o.customerPhone, 'Total': o.totalPrice, 'Status': getStatusText(o.status), 'Tanggal': new Date(o.date).toLocaleString('id-ID') }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `orders_export_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Data berhasil diexport!');
        }

        function escapeHtml(text) { if (!text) return ''; return String(text).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        function closeDetailModal() { document.getElementById('detailModal').classList.remove('show'); }
        function closeProofModal() { document.getElementById('proofModal').classList.remove('show'); }
        function closeVerifyModal() { document.getElementById('verifyModal').classList.remove('show'); }
        function closeUploadModal() { document.getElementById('uploadModal').classList.remove('show'); }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderOrders(btn.dataset.status);
            });
        });

        document.getElementById('logoutAdminBtn')?.addEventListener('click', () => {
            localStorage.removeItem('regalstudio_session');
            sessionStorage.removeItem('regalstudio_session');
            window.location.href = '../client/login.html';
        });

        renderOrders();

        window.viewOrderDetail = viewOrderDetail;
        window.closeDetailModal = closeDetailModal;
        window.viewPaymentProof = viewPaymentProof;
        window.closeProofModal = closeProofModal;
        window.openVerifyModal = openVerifyModal;
        window.verifyPayment = verifyPayment;
        window.closeVerifyModal = closeVerifyModal;
        window.openUploadModal = openUploadModal;
        window.saveResultWithStatus = saveResultWithStatus;
        window.deleteOrder = deleteOrder;
        window.closeUploadModal = closeUploadModal;
        window.exportOrders = exportOrders;
    </script>
</body>
</html>
